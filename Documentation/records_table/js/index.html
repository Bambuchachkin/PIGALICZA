<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIGALICZA</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 50px auto;
            text-align: center;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
        }
        .menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-top: 30px;
        }
        .menu a {
            display: inline-block;
            width: 200px;
            padding: 12px 20px;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            transition: background 0.2s;
        }
        .menu a:hover {
            background: #45a049;
        }
        .menu a.login {
            background: #2196F3;
        }
        .menu a.login:hover {
            background: #0b7dda;
        }
        .menu a.profile {
            background: #FF9800;
        }
        .menu a.profile:hover {
            background: #e68900;
        }
        .menu a.leaderboard {
            background: #FF9800;
        }
        .menu a.leaderboard:hover {
            background: #e68900;
        }
    </style>
</head>
<body>
    <h1>Добро пожаловать в PIGALICZA</h1>
    <div class="menu">
        <a href="/register.html">Регистрация</a>
        <a href="/login.html" class="login">Вход</a>
        <a href="/profile.html" class="profile">Профиль</a>
        <a href="/leaderboard_choice.html" style="background:#9C27B0;">Таблица лидеров</a>
    </div>
</body>
</html>
